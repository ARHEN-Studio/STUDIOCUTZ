<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STUDIO CUTZ</title>
    <!-- Chargement de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chargement des icônes -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .nav-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex justify-center bg-zinc-100 min-h-screen font-sans">

    <div class="w-full max-w-md bg-zinc-950 h-screen flex flex-col relative shadow-2xl overflow-hidden text-zinc-900">
        
        <!-- EN-TÊTE FIXE -->
        <header id="main-header" class="absolute top-0 w-full z-30 flex flex-col px-6 transition-all duration-500 bg-white/80 backdrop-blur-md pt-5 pb-3">
            <div id="header-border" class="absolute bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-zinc-200 to-transparent transition-opacity duration-500 opacity-100 z-0"></div>
            
            <div class="flex justify-between items-center w-full mb-4">
                <h1 id="header-title" class="relative z-10 text-2xl font-black tracking-tighter uppercase transform scale-y-110 origin-left transition-colors duration-500 text-zinc-900">
                    STUDIO CUTZ.
                </h1>
                <a href="https://www.planity.com/studio-cutz-83300-draguignan" target="_blank" id="header-btn" class="relative z-10 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider flex items-center gap-2 shadow-md transition-all duration-500 bg-black text-white hover:bg-zinc-800">
                    <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                    RDV
                </a>
            </div>

            <!-- NAVIGATION HAUTE (SEGMENTED) -->
            <nav id="top-nav" class="relative z-10 flex bg-zinc-200/50 backdrop-blur-sm p-1 rounded-xl items-center border border-white/20">
                <button id="nav-salon" onclick="switchTab('salon')" class="nav-btn flex-1 py-2 px-3 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all duration-300 bg-black text-white shadow-lg">
                    Le Salon
                </button>
                <button id="nav-tarifs" onclick="switchTab('tarifs')" class="nav-btn flex-1 py-2 px-3 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all duration-300 text-zinc-500 hover:text-zinc-800">
                    Tarifs
                </button>
                <button id="nav-artistes" onclick="switchTab('artistes')" class="nav-btn flex-1 py-2 px-3 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all duration-300 text-zinc-500 hover:text-zinc-800">
                    Artistes
                </button>
            </nav>
        </header>

        <!-- CONTENU -->
        <main id="main-content" class="flex-1 overflow-y-auto hide-scrollbar pt-[118px] pb-8 transition-colors duration-500 bg-white">
            
            <!-- ONGLET 1 : LE SALON -->
            <div id="tab-salon" class="animate-fade-in pb-8 bg-white">
                <div class="w-full h-[45vh] bg-zinc-200 relative -mt-[118px]">
                    <img src="Salon.PNG" alt="Salon" class="w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-black/10"></div>
                </div>
                <div class="bg-white px-6 py-8 space-y-8">
                    <div class="space-y-2">
                        <h2 class="text-3xl font-black uppercase">Bienvenue au Studio.</h2>
                        <p class="text-zinc-500 font-light leading-relaxed">Précision chirurgicale et ambiance exclusive.</p>
                    </div>
                    <a href="https://www.planity.com/studio-cutz-83300-draguignan" target="_blank" class="w-full bg-black text-white flex items-center justify-between p-4 rounded-2xl shadow-xl active:scale-95 transition-transform">
                        <span class="font-bold text-lg ml-2">Prendre Rendez-vous</span>
                        <div class="bg-white/20 p-2 rounded-full"><i data-lucide="arrow-right" class="w-5 h-5"></i></div>
                    </a>
                </div>
            </div>

            <!-- ONGLET 2 : TARIFS -->
            <div id="tab-tarifs" class="animate-fade-in min-h-full bg-white p-6 hidden">
                <h2 class="text-3xl font-black mb-6 tracking-tight">TARIFS.</h2>
                <div class="space-y-4">
                    <div class="bg-zinc-50 p-5 rounded-2xl border border-zinc-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold">Coupe Homme Classique</h4>
                            <p class="text-xs text-zinc-500">Shampooing inclus</p>
                        </div>
                        <span class="font-black">20 €</span>
                    </div>
                    <div class="bg-zinc-50 p-5 rounded-2xl border border-zinc-100 flex justify-between items-center">
                        <div>
                            <h4 class="font-bold">Coupe + Barbe</h4>
                            <p class="text-xs text-zinc-500">Le forfait complet</p>
                        </div>
                        <span class="font-black">25 €</span>
                    </div>
                </div>
            </div>

            <!-- ONGLET 3 : ARTISTES -->
            <div id="tab-artistes" class="hidden flex-col min-h-screen text-white bg-zinc-950 pb-8">
                <div id="artist-0" class="artist-view animate-fade-in">
                    <div class="relative w-full h-[calc(100vh-120px)] -mt-[118px]">
                        <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1000&auto=format&fit=crop" class="w-full h-full object-cover grayscale" />
                        <div class="absolute bottom-12 w-full text-center px-8">
                            <span class="px-3 py-1 bg-white text-black text-[10px] font-bold rounded-full">MASTER BARBER</span>
                            <h2 class="text-4xl font-black mt-2">SONNY FIRMINO</h2>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const tabs = ['salon', 'tarifs', 'artistes'];
        let currentTabIdx = 0;

        function switchTab(tabId) {
            tabs.forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('nav-' + t).className = "nav-btn flex-1 py-2 px-3 rounded-lg text-[10px] font-bold uppercase tracking-widest transition-all duration-300 text-zinc-500 hover:text-zinc-800";
            });

            const activeTab = document.getElementById('tab-' + tabId);
            activeTab.classList.remove('hidden');
            if(tabId === 'artistes') activeTab.classList.add('flex');

            const activeBtn = document.getElementById('nav-' + tabId);
            activeBtn.className = "nav-btn flex-1 py-2 px-3 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all duration-300 bg-black text-white shadow-lg";

            // Style Header
            const header = document.getElementById('main-header');
            const main = document.getElementById('main-content');
            if(tabId === 'artistes') {
                header.className = "absolute top-0 w-full z-30 flex flex-col px-6 transition-all duration-500 bg-gradient-to-b from-black/80 to-transparent pt-5 pb-3";
                main.className = "flex-1 overflow-y-auto hide-scrollbar pt-[118px] pb-8 transition-colors duration-500 bg-zinc-950 text-white";
            } else {
                header.className = "absolute top-0 w-full z-30 flex flex-col px-6 transition-all duration-500 bg-white/80 backdrop-blur-md pt-5 pb-3";
                main.className = "flex-1 overflow-y-auto hide-scrollbar pt-[118px] pb-8 transition-colors duration-500 bg-white text-zinc-900";
            }
            main.scrollTop = 0;
            currentTabIdx = tabs.indexOf(tabId);
        }

        // SWIPE LOGIC
        let touchstartX = 0;
        let touchendX = 0;
        const mainContent = document.getElementById('main-content');
        mainContent.addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
        mainContent.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            const threshold = 80;
            if (touchendX < touchstartX - threshold && currentTabIdx < tabs.length - 1) switchTab(tabs[currentTabIdx + 1]);
            else if (touchendX > touchstartX + threshold && currentTabIdx > 0) switchTab(tabs[currentTabIdx - 1]);
        }, {passive: true});
    </script>
</body>
</html>
